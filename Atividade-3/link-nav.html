<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="link-nav.css">
    <title>Link de Navegação</title>
</head>
<body>
    <main class="main">
        <div class="container">
            <nav class="container-navegacao">
                <ul class="paginacao normal">
                    <li>&laquo;</li>
                    <li>1</li>
                    <li>2</li>
                    <li>3</li>
                    <li>&raquo;</li>
                </ul>
                <ul class="paginacao hover">
                    <li>&laquo;</li>
                    <li>1</li>
                    <li class="active">2</li>
                    <li>3</li>
                    <li>&raquo;</li>
                </ul>
            </nav>
        </div>
    </main>
</body>
</html>
